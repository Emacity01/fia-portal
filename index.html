<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Emacity MUN • FIA Committee</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Orbitron', sans-serif;
    background:black;
    color:white;
    overflow:hidden;
}

/* LOGIN SCREEN */
#loginScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#loginScreen h2{
  position:absolute;
  top:20px;
  left:30px;
  color:#e10600;
  letter-spacing:3px;
}

#loginScreen input{
  padding:15px;
  font-size:20px;
  text-align:center;
  border:none;
  margin-top:20px;
}

#loginScreen button{
  margin-top:20px;
  padding:15px 40px;
  font-size:20px;
  background:#e10600;
  color:white;
  border:none;
  cursor:pointer;
}

/* MAIN */
#startBtn{
    position:absolute;
    top:45%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:18px 60px;
    font-size:22px;
    background:red;
    border:none;
    color:white;
    cursor:pointer;
}

#ready{
    position:absolute;
    top:30%;
    width:100%;
    text-align:center;
    font-size:60px;
    display:none;
    animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:0.2;}}

#lights{
    position:absolute;
    top:42%;
    width:100%;
    text-align:center;
    display:none;
}
.light{
    height:60px;
    width:60px;
    margin:20px;
    display:inline-block;
    border-radius:50%;
    background:#300;
}

#result{
    position:absolute;
    top:35%;
    left:50%;
    transform:translateX(-50%);
    width:60%;
    padding:40px;
    text-align:center;
    font-size:38px;
    display:none;
    background:rgba(0,0,0,0.7);
    border:2px solid red;
    box-shadow:0 0 40px red;
}

#name,#port{ color:#e10600; }

#clock{
    position:absolute;
    top:20px;
    right:40px;
    font-size:22px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h2>Emacity Model United Nations • FIA Committee</h2>
  <h1>ENTER FIA ID</h1>
  <input id="fiaid" placeholder="FIA-001">
  <button onclick="enterSite()">ENTER</button>
</div>

<audio id="beep" src="f1sound.mp3"></audio>
<audio id="typeSound" src="https://www.soundjay.com/mechanical/keyboard-1.wav"></audio>

<!-- MAIN CONTENT -->
<div id="clock"></div>

<button id="startBtn" onclick="startShow()">INITIATE FIA ALLOTMENT</button>

<div id="ready">ARE YOU READY?</div>

<div id="lights">
    <div class="light" id="l1"></div>
    <div class="light" id="l2"></div>
    <div class="light" id="l3"></div>
    <div class="light" id="l4"></div>
</div>

<div id="result">
  <p>Delegate: <strong id="name"></strong></p>
  <p>Portfolio: <strong id="port"></strong></p>
</div>

<script>
/* ===== DELEGATES DATABASE (EDIT ONLY THIS LATER) ===== */
const delegates = {
  "FIA-001": {
    name: "Vallarry Kshipra Mangesh Deshmukh",
    portfolio: "George Russell"
  },
  "FIA-002": {
    name: "Anomitra Das",
    portfolio: "Lewis Hamilton"
  }
};

let currentDelegate = null;

/* LOGIN */
function enterSite(){
  let id = document.getElementById("fiaid").value.trim();

  if(delegates[id]){
    currentDelegate = delegates[id];
    document.getElementById("beep").play();
    document.getElementById("loginScreen").remove();
  } else {
    alert("Invalid FIA ID");
  }
}

/* CLOCK */
function updateClock(){
  document.getElementById("clock").innerHTML=new Date().toLocaleTimeString();
}
setInterval(updateClock,1000);

/* TYPING */
function typeWriter(element, text, speed){
    let i = 0;
    element.innerHTML="";
    const typing = setInterval(()=>{
        if(i < text.length){
            element.innerHTML += text.charAt(i);
            document.getElementById("typeSound").currentTime = 0;
            document.getElementById("typeSound").play();
            i++;
        } else {
            clearInterval(typing);
        }
    }, speed);
}

/* SHOW SEQUENCE */
function startShow(){
    document.getElementById("startBtn").style.display="none";
    document.getElementById("ready").style.display="block";

    setTimeout(()=>{
        document.getElementById("ready").style.display="none";
        document.getElementById("lights").style.display="block";

        let lights=["l1","l2","l3","l4"];
        let i=0;

        let interval=setInterval(()=>{
            let el=document.getElementById(lights[i]);
            el.style.background="red";
            el.style.boxShadow="0 0 40px red";
            i++;
            if(i==4){
                clearInterval(interval);
                setTimeout(()=>{
                    document.getElementById("lights").style.display="none";
                    showResult();
                },800);
            }
        },700);

    },2000);
}

function showResult(){
    document.getElementById("result").style.display="block";

    typeWriter(document.getElementById("name"), currentDelegate.name, 80);
    setTimeout(()=>{
        typeWriter(document.getElementById("port"), currentDelegate.portfolio, 80);
    },1500);
}
</script>

</body>
</html>
