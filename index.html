<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FIA Allotment</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
<style>

body{
    margin:0;
    font-family:'Orbitron', sans-serif;
    background:url('https://imgs.search.brave.com/um80_UHagsPGcFZTUsOcvkQVb3lccVveXoqJcJUEN28/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9kMm45/aDJ3aXRzMjNoZi5j/bG91ZGZyb250Lm5l/dC9pbWFnZS92MS9z/dGF0aWMvNjA1Nzk0/OTQzMjAwMS8xMWU3/NDdhNi01NTg2LTQ2/YTQtOGEyOS1jOTQw/ODhhZDkzYjgvNzZi/NGQ2Y2MtMjkxZS00/ZmJhLWFhNWYtYTVi/NGI2YjIwMWY2Lzg2/NHg0ODYvbWF0Y2gv/aW1hZ2UuanBn') center/cover no-repeat fixed;
    color:white;
    overflow:hidden;
}
/* (rest of your CSS exactly same as you sent — keep it as is) */
</style>
</head>

<body>
<div class="overlay"></div>

<div id="gate">
    <h1 style="color:red; margin-bottom:25px;">Enter FIA ID</h1>
    <input type="text" id="fiaInput" placeholder="FIA-001">
    <button onclick="checkID()">Enter</button>
</div>

<div id="broadcastTag">EMACITY MODEL UNITED NATIONS • FIA COMMITTEE</div>
<div id="clock"></div>

<button id="startBtn" onclick="startShow()">INITIATE FIA ALLOTMENT</button>

<div id="ready">ARE YOU READY?</div>
<div id="lights">
    <div class="light" id="l1"></div>
    <div class="light" id="l2"></div>
    <div class="light" id="l3"></div>
    <div class="light" id="l4"></div>
</div>

<div id="result">
    <div class="munHeading">
        EMACITY MODEL UNITED NATIONS
        <span>FIA COMMITTEE</span>
    </div>
    <p>Delegate: <strong id="name"></strong></p>
    <p id="roleLine">Portfolio: <strong id="port"></strong></p>
</div>

<div id="ticker">
<span>FIA News • DRS debate • Rain probability 60% • Track limits warning • Safety car protocol revision</span>
</div>

<audio id="startSound" src="f1sound.mp3"></audio>
<audio id="typeSound" src="https://www.soundjay.com/mechanical/keyboard-1.wav"></audio>

<script>
const delegates = {
"FIA-001": { name:"Vallarry Kshipra Mangesh Deshmukh", portfolio:"George Russell" },
"FIA-002": { name:"Anomitra Das", portfolio:"Lewis Hamilton" },
"FIA-003": { name:"Adit Kulkarni", portfolio:"Toto Wolff" },
"FIA-004": { name:"Neil Pillai", portfolio:"Carlos Sainz" },
"FIA-005": { name:"Ritvik Duradundeshwara Hukkeri", portfolio:"Max Verstappen" },
"FIA-006": { name:"Aarav Mittal", portfolio:"Frédéric Vasseur" },
"FIA-007": { name:"Rishan Shaikh", portfolio:"Lance Stroll" },
"FIA-008": { name:"Kapish Jhawar", portfolio:"Charles Leclerc" },

"NEV07": { name: "Nevin Mehta", position: "President" },
"TAN08": { name: "Tanishqa", position: "Vice President" },
"JAS09": { name: "Jashith Ludhani", position: "Rapporteur" }
};

let currentDelegate = null;

function checkID(){
    const id = document.getElementById("fiaInput").value.trim().toUpperCase();
    if(delegates[id]){
        currentDelegate = delegates[id];
        document.getElementById("gate").style.display="none";
        document.getElementById("startBtn").style.display="block";
    } else alert("Invalid FIA ID");
}

function updateClock(){
    document.getElementById("clock").innerHTML=new Date().toLocaleTimeString();
}
setInterval(updateClock,1000);

function startShow(){
    document.getElementById("startSound").play();
    document.getElementById("startBtn").style.display="none";
    document.getElementById("ready").style.display="block";

    setTimeout(()=>{
        document.getElementById("ready").style.display="none";
        document.getElementById("lights").style.display="block";

        let lights=["l1","l2","l3","l4"];
        let i=0;
        let interval=setInterval(()=>{
            let el=document.getElementById(lights[i]);
            el.style.background="red";
            el.style.boxShadow="0 0 40px red";
            i++;
            if(i==4){
                clearInterval(interval);
                setTimeout(()=>{ 
                    document.getElementById("lights").style.display="none";
                    showResult();
                },800);
            }
        },700);

    },2000);
}

function showResult(){
    document.getElementById("name").innerText = currentDelegate.name;

    const roleLine = document.getElementById("roleLine");

    if(currentDelegate.position){
        roleLine.innerHTML = 'Position: <strong id="port"></strong>';
        document.getElementById("port").innerText = currentDelegate.position;
    } else {
        roleLine.innerHTML = 'Portfolio: <strong id="port"></strong>';
        document.getElementById("port").innerText = currentDelegate.portfolio;
    }

    document.getElementById("result").style.display="block";
}

document.addEventListener("click",function enterFullscreen(){
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    }
    document.removeEventListener("click",enterFullscreen);
});
</script>

</body>
</html>
