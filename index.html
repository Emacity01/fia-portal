<!DOCTYPE html>
<html>
<head>
    <title>Emacity MUN – FIA Committee</title>
    <style>
        body{
            margin:0;
            font-family: 'Segoe UI', sans-serif;
            background: #0d0d0d;
            color:white;
        }

        /* ====== FIA GATE ====== */
        #gate{
            position: fixed;
            width:100%;
            height:100vh;
            background: linear-gradient(135deg,#1a0000,#330000);
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            z-index:9999;
        }

        #gate h1{
            color:#ff4d4d;
            letter-spacing:2px;
            margin-bottom:30px;
        }

        #fiaInput{
            padding:15px;
            width:250px;
            border:none;
            border-radius:8px;
            font-size:16px;
            text-align:center;
        }

        #enterBtn{
            margin-top:20px;
            padding:12px 30px;
            background:#ff1a1a;
            border:none;
            border-radius:8px;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        /* ====== MAIN SITE ====== */
        #mainContent{
            display:none;
            padding:40px;
            text-align:center;
        }

        .munHeading{
            font-size:32px;
            font-weight:bold;
            margin-bottom:40px;
            color:#ff3333;
            letter-spacing:1px;
        }

        .card{
            margin:auto;
            width:350px;
            padding:30px;
            background:#1a1a1a;
            border-radius:12px;
            box-shadow:0 0 20px rgba(255,0,0,0.4);
        }

        .card h2{
            margin:10px 0;
            font-size:24px;
        }

        .card p{
            font-size:18px;
            color:#ccc;
        }
    </style>
</head>
<body>

<!-- ===== FIA ID GATE ===== -->
<div id="gate">
    <h1>Enter FIA ID</h1>
    <input type="text" id="fiaInput" placeholder="FIA-001">
    <button id="enterBtn" onclick="checkID()">Enter</button>
</div>

<!-- ===== MAIN WEBSITE ===== -->
<div id="mainContent">
    <div class="munHeading">
        Emacity Model United Nations — FIA Committee
    </div>

    <div class="card">
        <h2 id="name">Delegate Name</h2>
        <p id="portfolio">Portfolio</p>
    </div>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>
    const data = {
        "FIA-001": {
            name: "Vallarry Kshipra Mangesh Deshmukh",
            portfolio: "George Russell"
        },
        "FIA-002": {
            name: "Anomitra Das",
            portfolio: "Lewis Hamilton"
        },
        "FIA-003": {
            name: "Adit Kulkarni",
            portfolio: "Toto Wolff"
        }
    };

    function checkID(){
        let id = document.getElementById("fiaInput").value.trim().toUpperCase();

        if(data[id]){
            document.getElementById("clickSound").play();

            document.getElementById("name").innerText = data[id].name;
            document.getElementById("portfolio").innerText = data[id].portfolio;

            document.getElementById("gate").style.display = "none";
            document.getElementById("mainContent").style.display = "block";
        }
        else{
            alert("Invalid FIA ID");
        }
    }
</script>

</body>
</html>
