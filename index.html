<!DOCTYPE html>
<html>
<head>
<title>Emacity MUN • FIA Control</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Orbitron', sans-serif;
    background:black;
    color:white;
    overflow:hidden;
}

/* ================= FIA ID GATE ================= */
#loginScreen{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
#loginScreen h2{
    position:absolute;
    top:20px;
    left:30px;
    color:#e10600;
    letter-spacing:3px;
}
#loginScreen input{
    padding:15px;
    font-size:20px;
    text-align:center;
    margin-top:20px;
}
#loginScreen button{
    margin-top:20px;
    padding:15px 40px;
    font-size:20px;
    background:#e10600;
    border:none;
    color:white;
    cursor:pointer;
}

/* ================= ORIGINAL DESIGN ================= */

.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.82);
}

body::after{
    content:"";
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background-image:
      linear-gradient(rgba(255,0,0,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,0,0,0.08) 1px, transparent 1px);
    background-size:60px 60px;
    pointer-events:none;
}

#broadcastTag{
    position:absolute;
    top:20px;
    left:30px;
    background:rgba(0,0,0,0.75);
    border-left:6px solid red;
    padding:12px 18px;
    font-size:18px;
    letter-spacing:2px;
    box-shadow:0 0 20px red;
}

#clock{
    position:absolute;
    top:20px;
    right:40px;
    font-size:22px;
}

#startBtn{
    position:absolute;
    top:45%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:18px 60px;
    font-size:22px;
    background:red;
    border:none;
    color:white;
    cursor:pointer;
}

#ready{
    position:absolute;
    top:30%;
    width:100%;
    text-align:center;
    font-size:60px;
    display:none;
    animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:0.2;}}

#lights{
    position:absolute;
    top:42%;
    width:100%;
    text-align:center;
    display:none;
}
.light{
    height:60px;
    width:60px;
    margin:20px;
    display:inline-block;
    border-radius:50%;
    background:#300;
}

#result{
    position:absolute;
    top:35%;
    left:50%;
    transform:translateX(-50%);
    width:60%;
    padding:40px;
    text-align:center;
    font-size:38px;
    display:none;
    background:rgba(0,0,0,0.65);
    border:2px solid red;
    box-shadow:0 0 40px red;
    border-radius:12px;
}

#ticker{
    position:absolute;
    bottom:0;
    width:100%;
    background:black;
    color:red;
    font-size:20px;
    padding:12px;
    white-space:nowrap;
    overflow:hidden;
}
#ticker span{
    display:inline-block;
    padding-left:100%;
    animation:scroll 20s linear infinite;
}
@keyframes scroll{to{transform:translateX(-100%);}}
</style>
</head>

<body>

<!-- FIA ID GATE -->
<div id="loginScreen">
    <h2>Emacity Model United Nations • FIA Committee</h2>
    <h1>ENTER FIA ID</h1>
    <input id="fiaid" placeholder="FIA-001">
    <button onclick="enterSite()">ENTER</button>
</div>

<!-- ORIGINAL PAGE -->
<div class="overlay"></div>

<div id="broadcastTag">EMACITY MODEL UNITED NATIONS • FIA COMMITTEE</div>
<div id="clock"></div>

<button id="startBtn" onclick="startShow()">INITIATE FIA ALLOTMENT</button>

<div id="ready">ARE YOU READY?</div>

<div id="lights">
    <div class="light" id="l1"></div>
    <div class="light" id="l2"></div>
    <div class="light" id="l3"></div>
    <div class="light" id="l4"></div>
</div>

<div id="result"></div>

<div id="ticker">
<span>FIA News • DRS debate • Rain probability 60% • Track limits warning • Safety car protocol revision</span>
</div>

<audio id="startSound" src="f1sound.mp3"></audio>
<audio id="typeSound" src="https://www.soundjay.com/mechanical/keyboard-1.wav"></audio>

<script>
/* ================= FIA ID LOGIC ================= */
const validIDs = ["FIA-001","FIA-002","FIA-003"];

function enterSite(){
    let id = document.getElementById("fiaid").value.trim();
    if(validIDs.includes(id)){
        document.getElementById("loginScreen").remove();
    } else {
        alert("Invalid FIA ID");
    }
}

/* ================= ORIGINAL SHOW ================= */
const nameText = "NAME HERE";
const portfolioText = "PORTFOLIO HERE";

function typeWriter(element, text, speed){
    let i = 0;
    const typing = setInterval(()=>{
        if(i < text.length){
            element.innerHTML += text.charAt(i);
            document.getElementById("typeSound").play();
            i++;
        } else clearInterval(typing);
    }, speed);
}

function startShow(){
    document.getElementById("startSound").play();
    document.getElementById("startBtn").style.display="none";
    document.getElementById("ready").style.display="block";

    setTimeout(()=>{
        document.getElementById("ready").style.display="none";
        document.getElementById("lights").style.display="block";

        let lights=["l1","l2","l3","l4"];
        let i=0;

        let interval=setInterval(()=>{
            let el=document.getElementById(lights[i]);
            el.style.background="red";
            i++;
            if(i==4){
                clearInterval(interval);
                setTimeout(()=>{
                    document.getElementById("lights").style.display="none";
                    showResult();
                },800);
            }
        },700);

    },2000);
}

function showResult(){
    const res = document.getElementById("result");
    res.style.display="block";
    res.innerHTML = "<p>Delegate: <strong id='name'></strong></p><p>Portfolio: <strong id='port'></strong></p>";

    typeWriter(document.getElementById("name"), nameText, 80);
    setTimeout(()=>{
        typeWriter(document.getElementById("port"), portfolioText, 80);
    },1500);
}

function updateClock(){
    document.getElementById("clock").innerHTML=new Date().toLocaleTimeString();
}
setInterval(updateClock,1000);
</script>

</body>
</html>
