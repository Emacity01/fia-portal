<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FIA Allotment</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    font-family:'Orbitron', sans-serif;
    background:url('https://imgs.search.brave.com/um80_UHagsPGcFZTUsOcvkQVb3lccVveXoqJcJUEN28/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9kMm45/aDJ3aXRzMjNoZi5j/bG91ZGZyb250Lm5l/dC9pbWFnZS92MS9z/dGF0aWMvNjA1Nzk0/OTQzMjAwMS8xMWU3/NDdhNi01NTg2LTQ2/YTQtOGEyOS1jOTQw/ODhhZDkzYjgvNzZi/NGQ2Y2MtMjkxZS00/ZmJhLWFhNWYtYTVi/NGI2YjIwMWY2Lzg2/NHg0ODYvbWF0Y2gv/aW1hZ2UuanBn') center/cover no-repeat fixed;
    color:white;
    overflow:hidden;
}
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.82);
}
body::after{
    content:"";
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background-image:
      linear-gradient(rgba(255,0,0,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,0,0,0.08) 1px, transparent 1px);
    background-size:60px 60px;
    pointer-events:none;
}
#gate{
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.95);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
#gate input, #gate button{
    padding:12px;
    font-size:18px;
    border-radius:6px;
    border:none;
    margin:8px;
}
#gate button{
    background:red;
    color:white;
    cursor:pointer;
}
#broadcastTag{
    position:absolute;
    top:20px;
    left:30px;
    background:rgba(0,0,0,0.75);
    border-left:6px solid red;
    padding:12px 18px;
    font-size:18px;
    letter-spacing:2px;
    font-weight:bold;
    box-shadow:0 0 20px red;
}
#clock{
    position:absolute;
    top:20px;
    right:40px;
    font-size:22px;
}
#startBtn{
    position:absolute;
    top:45%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:18px 60px;
    font-size:22px;
    background:red;
    border:none;
    color:white;
    cursor:pointer;
}
#ready{
    position:absolute;
    top:30%;
    width:100%;
    text-align:center;
    font-size:60px;
    display:none;
    animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:0.2;}}
#lights{
    position:absolute;
    top:42%;
    width:100%;
    text-align:center;
    display:none;
}
.light{
    height:60px;
    width:60px;
    margin:20px;
    display:inline-block;
    border-radius:50%;
    background:#300;
}
#result{
    position:absolute;
    top:35%;
    left:50%;
    transform:translateX(-50%);
    width:60%;
    padding:40px;
    text-align:center;
    font-size:38px;
    display:none;
    background:rgba(0,0,0,0.65);
    border:2px solid red;
    box-shadow:0 0 40px red;
    border-radius:12px;
}
.munHeading{
    font-size:42px;
    margin-bottom:40px;
}
#delegateName,#delegatePort{
    display:block;
    font-size:32px;
    margin-top:20px;
    color:#ff4d4d;
}
#ticker{
    position:absolute;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.85);
    font-size:20px;
    padding:12px 0;
    white-space:nowrap;
    overflow:hidden;
    border-top:2px solid red;
}
#ticker span{
    display:inline-block;
    padding-left:100%;
    animation:scroll 20s linear infinite;
}
@keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}
</style>
</head>

<body>
<div class="overlay"></div>

<div id="gate">
    <h1 style="color:red;">Enter FIA ID</h1>
    <input type="text" id="fiaInput" placeholder="FIA-001">
    <button onclick="checkID()">Enter</button>
</div>

<div id="broadcastTag">EMACITY MODEL UNITED NATIONS</div>
<div id="clock"></div>

<button id="startBtn" onclick="startShow()" style="display:none;">INITIATE FIA ALLOTMENT</button>

<div id="ready">ARE YOU READY?</div>
<div id="lights">
    <div class="light" id="l1"></div>
    <div class="light" id="l2"></div>
    <div class="light" id="l3"></div>
    <div class="light" id="l4"></div>
</div>

<div id="result">
    <div class="munHeading">EMACITY MODEL UNITED NATIONS</div>
    <span id="delegateName"></span>
    <span id="delegatePort"></span>
</div>

<div id="ticker">
<span>FIA News • DRS debate • Rain probability 60% • Track limits warning • Safety car protocol revision</span>
</div>

<audio id="typeSound" src="https://www.soundjay.com/mechanical/keyboard-1.wav"></audio>

<script>
const delegates = {
  "FIA-001": { name:"Vallarry Kshipra Mangesh Deshmukh", portfolio:"George Russell" },
  "FIA-002": { name:"Anomitra Das", portfolio:"Lewis Hamilton" },
  "FIA-003": { name:"Adit Kulkarni", portfolio:"Toto Wolff" },
  "FIA-004": { name:"Neil Pillai", portfolio:"Carlos Sainz" }
};

let currentDelegate=null;

function checkID(){
    const id=document.getElementById("fiaInput").value.trim().toUpperCase();
    if(delegates[id]){
        currentDelegate=delegates[id];
        document.getElementById("gate").style.display="none";
        document.getElementById("startBtn").style.display="block";
    }else alert("Invalid FIA ID");
}

function updateClock(){
    document.getElementById("clock").innerHTML=new Date().toLocaleTimeString();
}
setInterval(updateClock,1000);

function typeWriter(el,text,speed,cb){
    let i=0;
    el.innerHTML="";
    let t=setInterval(()=>{
        if(i<text.length){
            el.innerHTML+=text[i++];
            document.getElementById("typeSound").play();
        }else{
            clearInterval(t);
            if(cb)cb();
        }
    },speed);
}

function startShow(){
    document.getElementById("ready").style.display="block";
    setTimeout(()=>{
        document.getElementById("ready").style.display="none";
        document.getElementById("lights").style.display="block";
        let ids=["l1","l2","l3","l4"],i=0;
        let int=setInterval(()=>{
            document.getElementById(ids[i]).style.background="red";
            i++;
            if(i===4){
                clearInterval(int);
                setTimeout(()=>{
                    document.getElementById("lights").style.display="none";
                    document.getElementById("result").style.display="block";
                    typeWriter(delegateName,"Delegate: "+currentDelegate.name,60,()=>{
                        typeWriter(delegatePort,"Portfolio: "+currentDelegate.portfolio,60);
                    });
                },800);
            }
        },600);
    },2000);
}
</script>

</body>
</html>
