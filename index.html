<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FIA Allotment</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    font-family:'Orbitron', sans-serif;
    background:url('https://imgs.search.brave.com/um80_UHagsPGcFZTUsOcvkQVb3lccVveXoqJcJUEN28/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9kMm45/aDJ3aXRzMjNoZi5j/bG91ZGZyb250Lm5l/dC9pbWFnZS92MS9z/dGF0aWMvNjA1Nzk0/OTQzMjAwMS8xMWU3/NDdhNi01NTg2LTQ2/YTQtOGEyOS1jOTQw/ODhhZDkzYjgvNzZi/NGQ2Y2MtMjkxZS00/ZmJhLWFhNWYtYTVi/NGI2YjIwMWY2Lzg2/NHg0ODYvbWF0Y2gv/aW1hZ2UuanBn') center/cover no-repeat fixed;
    color:white;
    overflow:hidden;
}

/* Overlay */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.82);
}

/* Red grid overlay */
body::after{
    content:"";
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background-image:
      linear-gradient(rgba(255,0,0,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,0,0,0.08) 1px, transparent 1px);
    background-size:60px 60px;
    pointer-events:none;
}

/* FIA ID Gate */
#gate{
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.95);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
#gate input{
    padding:12px;
    font-size:18px;
    border-radius:6px;
    border:none;
    text-align:center;
    margin-bottom:15px;
}
#gate button{
    padding:12px 25px;
    font-size:18px;
    background:red;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
}
#gate button:hover{box-shadow:0 0 20px red;}

/* F1 TV style top-left tag */
#broadcastTag{
    position:absolute;
    top:20px;
    left:30px;
    background:rgba(0,0,0,0.75);
    border-left:6px solid red;
    padding:12px 18px;
    font-size:18px;
    letter-spacing:2px;
    font-weight:bold;
    color:white;
    box-shadow:0 0 20px red;
    z-index:1000;
}

/* Clock */
#clock{
    position:absolute;
    top:20px;
    right:40px;
    font-size:22px;
    font-weight:bold;
}

/* Start Button */
#startBtn{
    position:absolute;
    top:45%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:18px 60px;
    font-size:22px;
    background:red;
    border:none;
    color:white;
    cursor:pointer;
}
#startBtn:hover{ box-shadow:0 0 30px red; }

#ready{
    position:absolute;
    top:30%;
    width:100%;
    text-align:center;
    font-size:60px;
    display:none;
    animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:0.2;}}

#lights{
    position:absolute;
    top:42%;
    width:100%;
    text-align:center;
    display:none;
}
.light{
    height:60px;
    width:60px;
    margin:20px;
    display:inline-block;
    border-radius:50%;
    background:#300;
}

/* FIA Control Panel Box */
#result{
    position:absolute;
    top:35%;
    left:50%;
    transform:translateX(-50%);
    width:60%;
    padding:40px;
    text-align:center;
    font-size:38px;
    display:none;
    background:rgba(0,0,0,0.65);
    border:2px solid red;
    box-shadow:0 0 40px red;
    backdrop-filter: blur(8px);
    border-radius:12px;
    z-index:1100;
}

/* MUN Heading inside result */
.munHeading{
    font-size: 42px;
    font-weight: 800;
    margin-bottom: 50px;
    color: #ffffff;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    text-shadow: 0 0 25px rgba(255,0,0,0.9);
}
.munHeading span{
    display:block;
    font-size:22px;
    color:#ff4d4d;
    letter-spacing:6px;
}

/* News ticker */
#ticker{
    position:absolute;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.85);
    color:white;
    font-size:20px;
    padding:12px 0;
    white-space:nowrap;
    overflow:hidden;
    border-top:2px solid red;
}
#ticker span{
    display:inline-block;
    padding-left:100%;
    animation:scroll 20s linear infinite;
}
@keyframes scroll{0%{transform:translateX(0%);}100%{transform:translateX(-100%);}}

/* Optional red glow on hover for broadcast tag */
#broadcastTag:hover{
    box-shadow:0 0 40px red, 0 0 80px rgba(255,0,0,0.5);
}
</style>
</head>

<body>
<div class="overlay"></div>

<!-- ===== ID GATE ===== -->
<div id="gate">
    <h1 style="color:red; margin-bottom:25px;">Enter FIA ID</h1>
    <input type="text" id="fiaInput" placeholder="FIA-001">
    <button onclick="checkID()">Enter</button>
</div>

<!-- F1 style tag and clock -->
<div id="broadcastTag">EMACITY MODEL UNITED NATIONS • FIA COMMITTEE</div>
<div id="clock"></div>

<!-- Start button -->
<button id="startBtn" onclick="startShow()">INITIATE FIA ALLOTMENT</button>

<!-- Ready text and lights -->
<div id="ready">ARE YOU READY?</div>
<div id="lights">
    <div class="light" id="l1"></div>
    <div class="light" id="l2"></div>
    <div class="light" id="l3"></div>
    <div class="light" id="l4"></div>
</div>

<!-- Result panel -->
<div id="result">
    <div class="munHeading">
        EMACITY MODEL UNITED NATIONS
        <span>FIA COMMITTEE</span>
    </div>
    <p>Delegate: <strong id="name"></strong></p>
    <p>Portfolio: <strong id="port"></strong></p>
</div>

<!-- News ticker -->
<div id="ticker">
<span>FIA News • DRS debate • Rain probability 60% • Track limits warning • Safety car protocol revision</span>
</div>

<!-- Audio -->
<audio id="startSound" src="f1sound.mp3"></audio>
<audio id="typeSound" src="https://www.soundjay.com/mechanical/keyboard-1.wav"></audio>

<script>
// === Delegates ===
const delegates = {
"FIA-001": { name:"Vallarry Kshipra Mangesh Deshmukh", portfolio:"George Russell" },
"FIA-002": { name:"Anomitra Das", portfolio:"Lewis Hamilton" },
"FIA-003": { name:"Adit Kulkarni", portfolio:"Toto Wolff" },
"FIA-004": { name:"Neil Pillai", portfolio:"Carlos Sainz" },
"FIA-005": { name:"Ritvik Duradundeshwara Hukkeri", portfolio:"Max Verstappen" },
"FIA-006": { name:"Aarav Mittal", portfolio:"Frédéric Vasseur" },
"FIA-007": { name:"Rishan Shaikh", portfolio:"Charles Leclerc" }
};
let currentDelegate = null;

// === FIA ID Gate ===
function checkID(){
    const id = document.getElementById("fiaInput").value.trim().toUpperCase();
    if(delegates[id]){
        currentDelegate = delegates[id];
        document.getElementById("gate").style.display="none";
        document.getElementById("startBtn").style.display="block";
        document.getElementById("name").innerText = currentDelegate.name;
        document.getElementById("port").innerText = currentDelegate.portfolio;
    } else alert("Invalid FIA ID");
}

// === Clock ===
function updateClock(){
    document.getElementById("clock").innerHTML=new Date().toLocaleTimeString();
}
setInterval(updateClock,1000);

// === Typing ===
function typeWriter(element,text,speed){
    let i=0;
    element.innerHTML="";
    const typing = setInterval(()=>{
        if(i<text.length){
            element.innerHTML+=text.charAt(i);
            document.getElementById("typeSound").currentTime=0;
            document.getElementById("typeSound").play();
            i++;
        } else clearInterval(typing);
    },speed);
}

// === Start Show ===
function startShow(){
    document.getElementById("startSound").play();
    document.getElementById("startBtn").style.display="none";
    document.getElementById("ready").style.display="block";

    setTimeout(()=>{
        document.getElementById("ready").style.display="none";
        document.getElementById("lights").style.display="block";

        let lights=["l1","l2","l3","l4"];
        let i=0;
        let interval=setInterval(()=>{
            let el=document.getElementById(lights[i]);
            el.style.background="red";
            el.style.boxShadow="0 0 40px red";
            i++;
            if(i==4){
                clearInterval(interval);
                setTimeout(()=>{ 
                    document.getElementById("lights").style.display="none";
                    document.getElementById("result").style.display="block";
                },800);
            }
        },700);

    },2000);
}

// === Fullscreen on click ===
document.addEventListener("click",function enterFullscreen(){
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    }
    document.removeEventListener("click",enterFullscreen);
});
</script>

</body>
</html>
