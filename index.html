<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FIA Allotment</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Orbitron',sans-serif;
    background:#000;
    color:white;
    overflow:hidden;
}

#gate{
    position:absolute;
    top:0;left:0;right:0;bottom:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:10;
}

input{
    padding:12px;
    font-size:18px;
    margin-bottom:10px;
    text-align:center;
}

button{
    padding:12px 30px;
    font-size:18px;
    cursor:pointer;
}

#lights{
    display:flex;
    gap:20px;
    justify-content:center;
    margin-top:40px;
}

.light{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#222;
}

#result{
    text-align:center;
    margin-top:60px;
    font-size:26px;
    white-space:pre-line;
    min-height:120px;
}

#ticker{
    position:absolute;
    bottom:0;
    width:100%;
    background:#111;
    padding:10px 0;
    overflow:hidden;
    white-space:nowrap;
}

#ticker span{
    display:inline-block;
    padding-left:100%;
    animation:scroll 18s linear infinite;
}

@keyframes scroll{
    from{transform:translateX(0)}
    to{transform:translateX(-100%)}
}

#clock{
    position:absolute;
    top:15px;
    right:20px;
    font-size:16px;
}
</style>
</head>

<body>

<div id="gate">
    <input id="fiaId" placeholder="Enter FIA ID">
    <button onclick="unlock()">Enter</button>
</div>

<div id="clock"></div>

<div id="lights">
    <div class="light" id="l1"></div>
    <div class="light" id="l2"></div>
    <div class="light" id="l3"></div>
    <div class="light" id="l4"></div>
    <div class="light" id="l5"></div>
</div>

<div style="text-align:center;margin-top:30px;">
    <button onclick="startShow()">START</button>
</div>

<div id="result"></div>

<div id="ticker">
    <span>FIA News • DRS Enabled • Delegate Allotment System • Emacity Model United Nations • FIA Live Broadcast</span>
</div>

<audio id="startSound" src="https://www.soundjay.com/transportation/sounds/car-start-1.mp3"></audio>

<script>
let currentDelegate = null;

const delegates = {
    "FIA101":"Committee: IMF\nCountry: Japan",
    "FIA102":"Committee: UNHRC\nCountry: Brazil",
    "FIA103":"Committee: UNSC\nCountry: France"
};

function unlock(){
    const id = document.getElementById("fiaId").value.trim();
    if(delegates[id]){
        currentDelegate = delegates[id];
        document.getElementById("gate").style.display="none";
        document.documentElement.requestFullscreen();
    }else{
        alert("Invalid FIA ID");
    }
}

function startShow(){
    if(!currentDelegate){ alert("Enter FIA ID first"); return; }

    document.getElementById("startSound").play();

    let i=1;
    const interval = setInterval(()=>{
        if(i<=5){
            document.getElementById("l"+i).style.background="red";
            i++;
        }else{
            clearInterval(interval);
            showResult();
        }
    },600);
}

function showResult(){
    const text = currentDelegate;
    let i=0;
    const out = document.getElementById("result");
    out.innerHTML="";
    const typer = setInterval(()=>{
        if(i<text.length){
            out.innerHTML += text.charAt(i);
            i++;
        }else{
            clearInterval(typer);
        }
    },40);
}

setInterval(()=>{
    document.getElementById("clock").innerHTML =
        new Date().toLocaleTimeString('en-IN',{
            hour:'2-digit',
            minute:'2-digit',
            second:'2-digit'
        }) + " IST";
},1000);
</script>

</body>
</html>
